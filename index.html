<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全网热榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        .header .subtitle {
            font-size: 13px;
            margin-top: 8px;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .refresh-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(180deg);
        }
        
        .refresh-btn:active {
            transform: rotate(360deg);
        }
        
        .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .platform-selector {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .platform-label {
            text-align: center;
            color: #6c757d;
            font-size: 13px;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .platform-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .platform-btn {
            padding: 14px 10px;
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .platform-btn:hover {
            transform: translateY(-2px);
        }
        
        .platform-btn.active {
            transform: translateY(-2px);
        }
        
        /* 各平台品牌色 */
        .platform-btn.douyin {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            border-color: #1a1a2e;
        }
        
        .platform-btn.douyin:hover,
        .platform-btn.douyin.active {
            background: linear-gradient(135deg, #ff0050 0%, #00f2ea 100%);
            border-color: #ff0050;
            box-shadow: 0 4px 15px rgba(255,0,80,0.4);
        }
        
        .platform-btn.weibo {
            background: linear-gradient(135deg, #e6162d 0%, #ff6b6b 100%);
            color: white;
            border-color: #e6162d;
        }
        
        .platform-btn.weibo:hover,
        .platform-btn.weibo.active {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            box-shadow: 0 4px 15px rgba(230,22,45,0.4);
        }
        
        .platform-btn.bilibili {
            background: linear-gradient(135deg, #00a1d6 0%, #00b5e5 100%);
            color: white;
            border-color: #00a1d6;
        }
        
        .platform-btn.bilibili:hover,
        .platform-btn.bilibili.active {
            background: linear-gradient(135deg, #00b5e5 0%, #23ade5 100%);
            box-shadow: 0 4px 15px rgba(0,161,214,0.4);
        }
        
        .platform-btn.baidu {
            background: linear-gradient(135deg, #2932e1 0%, #4e6ef2 100%);
            color: white;
            border-color: #2932e1;
        }
        
        .platform-btn.baidu:hover,
        .platform-btn.baidu.active {
            background: linear-gradient(135deg, #4e6ef2 0%, #6b8cff 100%);
            box-shadow: 0 4px 15px rgba(41,50,225,0.4);
        }
        
        .platform-btn.twitter {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: white;
            border-color: #000000;
        }
        
        .platform-btn.twitter:hover,
        .platform-btn.twitter.active {
            background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .platform-btn.youtube {
            background: linear-gradient(135deg, #ff0000 0%, #ff4444 100%);
            color: white;
            border-color: #ff0000;
        }
        
        .platform-btn.youtube:hover,
        .platform-btn.youtube.active {
            background: linear-gradient(135deg, #ff3333 0%, #ff6666 100%);
            box-shadow: 0 4px 15px rgba(255,0,0,0.4);
        }
        
        .platform-btn.tiktok {
            background: linear-gradient(135deg, #ff0050 0%, #00f2ea 50%, #000000 100%);
            color: white;
            border-color: #ff0050;
        }
        
        .platform-btn.tiktok:hover,
        .platform-btn.tiktok.active {
            background: linear-gradient(135deg, #00f2ea 0%, #ff0050 50%, #000000 100%);
            box-shadow: 0 4px 15px rgba(255,0,80,0.4);
        }
        
        .content {
            padding: 25px 20px;
            max-height: 65vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .content::-webkit-scrollbar {
            width: 6px;
        }
        
        .content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .content::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        
        .content::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #adb5bd;
        }
        
        .loading::before {
            content: '⏳';
            display: block;
            font-size: 48px;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .hot-list {
            display: none;
        }
        
        .hot-list.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .hot-item {
            display: flex;
            align-items: center;
            padding: 16px 15px;
            margin-bottom: 10px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hot-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
        }
        
        .hot-item:hover {
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }
        
        .rank {
            width: 40px;
            text-align: center;
            font-weight: 800;
            font-size: 18px;
            color: #adb5bd;
            flex-shrink: 0;
        }
        
        .rank.top1 {
            background: linear-gradient(135deg, #ffd700 0%, #ffb800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 22px;
        }
        
        .rank.top2 {
            background: linear-gradient(135deg, #c0c0c0 0%, #a8a8a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 20px;
        }
        
        .rank.top3 {
            background: linear-gradient(135deg, #cd7f32 0%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 20px;
        }
        
        .hot-text {
            flex: 1;
            padding: 0 15px;
            font-size: 15px;
            color: #2d3748;
            line-height: 1.5;
            font-weight: 500;
            word-break: break-word;
        }
        
        /* 热度颜色阶梯 - 从红到紫 */
        .hot-text.rank-1 {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0000 0%, #ff4757 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hot-text.rank-2 {
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hot-text.rank-3 {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6348 0%, #ff7f50 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hot-text.rank-4 {
            font-size: 16px;
            font-weight: 600;
            color: #e74c3c;
        }
        
        .hot-text.rank-5 {
            font-size: 15px;
            font-weight: 600;
            color: #e84393;
        }
        
        .hot-text.rank-6 {
            font-size: 15px;
            font-weight: 600;
            color: #9b59b6;
        }
        
        .hot-text.rank-7 {
            font-size: 15px;
            font-weight: 500;
            color: #8e44ad;
        }
        
        .hot-text.rank-8 {
            font-size: 15px;
            font-weight: 500;
            color: #667eea;
        }
        
        .hot-text.rank-9 {
            font-size: 15px;
            font-weight: 500;
            color: #3498db;
        }
        
        .hot-text.rank-10 {
            font-size: 15px;
            font-weight: 500;
            color: #2980b9;
        }
        
        .hot-text.rank-normal {
            font-size: 15px;
            font-weight: 400;
            color: #2d3748;
        }
        
        .hot-value {
            font-size: 12px;
            color: #868e96;
            flex-shrink: 0;
            min-width: 60px;
            text-align: right;
            font-weight: 500;
            padding: 5px 10px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        /* 热度标签颜色 */
        .hot-value.rank-1 {
            background: linear-gradient(135deg, #ff0000 0%, #ff4757 100%);
            color: white;
            font-weight: 700;
        }
        
        .hot-value.rank-2 {
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            color: white;
            font-weight: 700;
        }
        
        .hot-value.rank-3 {
            background: linear-gradient(135deg, #ff6348 0%, #ff7f50 100%);
            color: white;
            font-weight: 600;
        }
        
        .hot-value.rank-4 {
            background: #ffebee;
            color: #e74c3c;
            font-weight: 600;
        }
        
        .hot-value.rank-5 {
            background: #fce4ec;
            color: #e84393;
            font-weight: 600;
        }
        
        .hot-value.rank-6 {
            background: #f3e5f5;
            color: #9b59b6;
            font-weight: 600;
        }
        
        .hot-value.rank-7 {
            background: #ede7f6;
            color: #8e44ad;
            font-weight: 500;
        }
        
        .hot-value.rank-8 {
            background: #e8eaf6;
            color: #667eea;
            font-weight: 500;
        }
        
        .hot-value.rank-9 {
            background: #e3f2fd;
            color: #3498db;
            font-weight: 500;
        }
        
        .hot-value.rank-10 {
            background: #e1f5fe;
            color: #2980b9;
            font-weight: 500;
        }
        
        .hot-value.rank-normal {
            background: #f8f9fa;
            color: #6c757d;
        }
        
        .go-btn {
            width: 36px;
            height: 36px;
            min-width: 36px;
            margin-left: 10px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .go-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .go-btn:active {
            transform: scale(0.95);
        }
        
        /* 分类标签 */
        .hot-content {
            flex: 1;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .category-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            width: fit-content;
        }
        
        /* 分类筛选 - 微博风格 */
        .category-selector {
            padding: 0;
            background: white;
            border-bottom: 1px solid #e9ecef;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .category-selector::-webkit-scrollbar {
            display: none;
        }
        
        .category-buttons {
            display: flex;
            gap: 0;
            padding: 0 10px;
            min-width: max-content;
        }
        
        .category-btn {
            padding: 15px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            transition: all 0.2s;
            position: relative;
            white-space: nowrap;
        }
        
        .category-btn:hover {
            color: #333;
        }
        
        .category-btn.active {
            color: #333;
            font-weight: 600;
        }
        
        .category-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: linear-gradient(90deg, #ff6b6b, #ffa502);
            border-radius: 2px;
        }
        

        
        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #adb5bd;
            font-size: 13px;
            border-top: 1px solid #e9ecef;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #adb5bd;
        }
        
        .empty::before {
            content: '😕';
            display: block;
            font-size: 64px;
            margin-bottom: 15px;
        }
        
        .empty div:first-of-type {
            font-size: 18px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }
        
        .empty div:last-of-type {
            font-size: 13px;
            color: #adb5bd;
        }
        
        @media (max-width: 768px) {
            .platform-buttons {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
        }
        
        @media (max-width: 480px) {
            .platform-buttons {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            
            .platform-btn {
                padding: 12px 6px;
                font-size: 13px;
            }
            
            .hot-item {
                padding: 14px 12px;
            }
            
            .rank {
                width: 35px;
                font-size: 16px;
            }
            
            .hot-text {
                font-size: 14px;
                padding: 0 10px;
            }
            
            .hot-text.very-hot {
                font-size: 16px;
            }
            
            .hot-text.hot {
                font-size: 15px;
            }
            
            .go-btn {
                width: 32px;
                height: 32px;
                min-width: 32px;
                font-size: 14px;
                margin-left: 8px;
            }
            
            .search-box {
                padding: 15px;
            }
            
            .search-input {
                padding: 12px 15px;
                font-size: 15px;
            }
            
            .search-btn {
                padding: 12px 18px;
                font-size: 14px;
            }
        }
        
        /* 搜索框样式 */
        .search-section {
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-bottom: 1px solid #dee2e6;
        }
        
        .search-box {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #e9ecef;
        }
        
        .search-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        .search-input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        
        .search-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.3);
        }
        
        .search-btn:active {
            transform: translateY(0);
        }
        

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="refresh-btn" id="refreshBtn" onclick="refreshAllData()" title="刷新全部数据">🔄</button>
            <h1>全网热榜</h1>
            <div class="subtitle">实时热点 · 一触即达</div>
        </div>
        
        <!-- 搜索框区域 -->
        <div class="search-section">
            <div class="search-box">
                <div class="search-input-wrapper">
                    <input type="text" class="search-input" id="searchInput" placeholder="输入关键词，用Yandex搜索全网..." onkeypress="if(event.key==='Enter')performYandexSearch()">
                    <button class="search-btn" onclick="performYandexSearch()">
                        🔍 搜索
                    </button>
                </div>

            </div>
        </div>
        
        <div class="platform-selector">
            <div class="platform-label">选择平台</div>
            <div class="platform-buttons">
                <button class="platform-btn active douyin" data-platform="douyin">
                    <span>抖音</span>
                </button>
                <button class="platform-btn weibo" data-platform="weibo">
                    <span>微博</span>
                </button>
                <button class="platform-btn bilibili" data-platform="bilibili">
                    <span>B站</span>
                </button>
                <button class="platform-btn baidu" data-platform="baidu">
                    <span>百度</span>
                </button>
            </div>
        </div>
        
        <!-- 分类筛选 -->
        <div class="category-selector" id="categorySelector" style="display: none;">
            <div class="category-buttons" id="categoryButtons">
                <button class="category-btn active" data-category="all">全部</button>
            </div>
        </div>
        
        <div class="content">
            <div class="loading">加载中...</div>
        </div>
        
        <div class="footer" id="updateTime"></div>
    </div>

    <script>
        // 分类配置 - 映射到固定分类
        const categories = {
            douyin: {
                0: { name: '热搜', color: '#e74c3c' },
                1: { name: '娱乐', color: '#e84393' },
                2: { name: '社会', color: '#e74c3c' },
                3: { name: '娱乐', color: '#fd79a8' },
                4: { name: '体育', color: '#00b894' },
                5: { name: '汽车', color: '#0984e3' },
                6: { name: '科技', color: '#6c5ce7' },
                7: { name: '财经', color: '#f39c12' },
                8: { name: '游戏', color: '#a29bfe' },
                9: { name: '热搜', color: '#fdcb6e' },
                10: { name: '娱乐', color: '#e17055' },
                16: { name: '生活', color: '#00cec9' },
                18: { name: '美食', color: '#fab1a0' },
                19: { name: '时尚', color: '#ff7675' },
                20: { name: '时尚', color: '#d63031' },
                21: { name: '生活', color: '#74b9ff' },
                22: { name: '生活', color: '#fd79a8' },
                23: { name: '生活', color: '#fdcb6e' },
                24: { name: '生活', color: '#55efc4' },
                25: { name: '社会', color: '#81ecec' },
                26: { name: '社会', color: '#74b9ff' },
                27: { name: '财经', color: '#a29bfe' },
                28: { name: '社会', color: '#636e72' },

            // 获取数据指纹（基于前5条热搜标题）
            getFingerprint(platform, data) {
                if (!data || data.length === 0) return null;
                return data.slice(0, 5).map(item => item.word).join('|');
            },
            // 检测数据是否变化
            hasChanged(platform, newData) {
                const newFingerprint = this.getFingerprint(platform, newData);
                const oldFingerprint = this.fingerprints[platform];
                return newFingerprint !== oldFingerprint;
            },
            // 更新指纹
            updateFingerprint(platform, data) {
                this.fingerprints[platform] = this.getFingerprint(platform, data);
            },
            // 保存缓存
            saveCache(platform, data) {
                this.cache[platform] = {
                    data: JSON.parse(JSON.stringify(data)),
                    timestamp: Date.now()
                };
            },
            // 获取缓存
            getCache(platform) {
                return this.cache[platform] || null;

            // 清除缓存
            clearCache(platform) {
                delete this.cache[platform];
                delete this.fingerprints[platform];

                const result = await fetchPlatformData(platform);
                results[platform] = result;
            });
            
            await Promise.all(promises);
            
            // 统计结果
            const stats = {
                fresh: 0,
                stale: 0,
                cached: 0,
                failed: 0
            };
            
            Object.entries(results).forEach(([platform, result]) => {
                if (!result.success) {
                    stats.failed++;
                } else if (result.source === 'cache') {
                    stats.cached++;
                } else if (result.fresh) {
                    stats.fresh++;
                } else {
                    stats.stale++;
                }
            });
            
            console.log('[数据新鲜度统计]', stats);
            updateFooterTime(stats);

        // 获取单个API的数据（带超时和重试）
        async function fetchSingleAPI(platform, apiUrl, timeout = 8000) {
            try {
                // 使用随机数+时间戳双重防缓存
                const cacheBuster = `_t=${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                const separator = apiUrl.includes('?') ? '&' : '?';
                const url = apiUrl + separator + cacheBuster;
                
                // 创建AbortController用于超时控制
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                    },
                    cache: 'no-store',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const result = await response.json();
                
                // 统一处理不同API的返回格式
                // 格式1: { code: 200, data: [...] }
                if (result.code === 200 && result.data) {
                    return Array.isArray(result.data) ? result.data : [result.data];
                }
                // 格式2: 直接返回数组
                else if (Array.isArray(result)) {
                    return result;
                }
                // 格式3: { data: [...] }
                else if (result.data && Array.isArray(result.data)) {
                    return result.data;
                }
                // 格式4: { result: [...] }
                else if (result.result && Array.isArray(result.result)) {
                    return result.result;
                }
                // 格式5: { list: [...] }
                else if (result.list && Array.isArray(result.list)) {
                    return result.list;
                }
                
                console.warn(`[${platform}] 无法解析API返回格式:`, result);
                return [];
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.warn(`[${platform}] API请求超时: ${apiUrl}`);
                } else {
                    console.warn(`[${platform}] API请求失败: ${apiUrl}`, error.message);
                }
                return [];
            }
        }
        
        // 合并多API数据并去重
        function mergeAndDeduplicate(platform, rawDataArray) {
            const seen = new Set();
            const merged = [];
            
            rawDataArray.forEach(item => {
                // 提取唯一标识（标题）
                let title = '';
                if (typeof item === 'string') {
                    title = item;
                } else if (typeof item === 'object' && item !== null) {
                    title = item.title || item.word || item.name || item.topic || item.query || item.keyword || '';
                }
                
                // 标准化标题用于去重（去除空格、转为小写）
                const normalizedTitle = title.toString().toLowerCase().replace(/\s+/g, '');
                
                if (normalizedTitle && !seen.has(normalizedTitle)) {
                    seen.add(normalizedTitle);
                    merged.push(item);
                }
            });
            
            return merged;
        }

        // 解析不同平台的数据格式
        function parsePlatformData(platform, data) {
            let list = [];
            
            // 统一处理各种可能的数据结构
            let rawList = [];
            
            if (Array.isArray(data)) {
                rawList = data;
            } else if (data && typeof data === 'object') {
                // 尝试从对象中提取数组
                const possibleArrays = ['list', 'data', 'items', 'result', 'hot_list', 'trends'];
                for (const key of possibleArrays) {
                    if (Array.isArray(data[key])) {
                        rawList = data[key];
                        break;
                    }
                }
                // 如果还是没找到，尝试对象的第一个数组属性
                if (rawList.length === 0) {
                    for (const key in data) {
                        if (Array.isArray(data[key]) && data[key].length > 0) {
                            rawList = data[key];
                            break;
                        }
                    }
                }
            }
            
            if (rawList.length === 0) {
                console.warn(`${platform} 平台未获取到数据`, data);
                return [];
            }
            
            // 解析所有数据
            let fullList = rawList.map((item, index) => {
                let word = '';
                let hotValue = 0;
                let label = null;
                
                if (typeof item === 'string') {
                    word = item;
                } else if (typeof item === 'object' && item !== null) {
                    // 尝试各种可能的字段名
                    word = item.word || item.title || item.name || item.topic || item.query || item.keyword || item.content || item.text || JSON.stringify(item);
                    
                    // 尝试各种可能的热度字段
                    const hotFields = ['hot_value', 'hotValue', 'hot', 'heat', 'score', 'count', 'num', 'value', 'index', 'rank'];
                    for (const field of hotFields) {
                        if (item[field] !== undefined && item[field] !== null) {
                            const val = parseHotValue(item[field]);
                            if (val > hotValue) hotValue = val;
                        }
                    }
                    
                    // 获取分类标签（抖音）
                    label = item.label !== undefined ? item.label : null;
                }
                
                // 获取分类信息
                const categoryInfo = getCategoryInfo(platform, word, label);
                
                return {
                    word: word,
                    hotValue: hotValue,
                    position: index + 1,
                    category: categoryInfo.name,
                    categoryColor: categoryInfo.color,
                    rawCategory: categoryInfo.rawName, // API原始分类名称
                    label: label
                };
            });
            
            // 先按热度降序排序
            fullList.sort((a, b) => b.hotValue - a.hotValue);
            
            // 重新设置排名
            fullList.forEach((item, index) => {
                item.position = index + 1;
            });
            
            // 保存完整数据
            hotData[platform + '_raw'] = [...fullList];
            
            // 返回全部数据（不限制条数）
            list = fullList;
            
            return list;
        }

        // 解析热度值字符串（如"100万"）
        function parseHotValue(hotStr) {
            if (!hotStr) return 0;
            
            if (typeof hotStr === 'number') return hotStr;
            
            const str = String(hotStr).toLowerCase();
            const num = parseFloat(str.replace(/[^0-9.]/g, ''));
            
            if (str.includes('亿')) {
                return num * 100000000;
            } else if (str.includes('万')) {
                return num * 10000;
            }
            
            return num || 0;
        }

                dataFreshness.clearCache(platform);

            await loadAllData();
            renderPlatform(currentPlatform);
            
            refreshBtn.classList.remove('loading');
            
            // 根据结果显示不同提示
            const cache = dataFreshness.getCache(currentPlatform);
            const originalText = refreshBtn.textContent;
            
            if (!cache) {
                // 获取失败

                    freshnessIndicator = ' <span style="color: #00b894;">✓ 全部最新</span>';
                } else if (stats.cached > 0) {
                    freshnessIndicator = ' <span style="color: #f39c12;">⚡ 使用缓存</span>';
                } else if (stats.stale > 0) {
                    freshnessIndicator = ` <span style="color: #f39c12;">~ ${stats.stale}个平台数据未更新</span>`;
                }
            }
            
            document.getElementById('updateTime').innerHTML = 
                '更新时间: ' + lastUpdateTime.toLocaleString('zh-CN', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                }) + ` | ${platformName}: ${dataCount}条${freshnessIndicator}`;
        }

        // 切换平台
        function switchPlatform(platform) {
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.platform === platform) {
                    btn.classList.add('active');
                }
            });
            currentPlatform = platform;
            currentCategory = 'all';
            renderCategoryButtons(platform);
            renderPlatform(platform);
            
            // 滚动到分类选择器位置
            const categorySelector = document.getElementById('categorySelector');
            if (categorySelector && categorySelector.style.display !== 'none') {
                categorySelector.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
        
        // 固定分类列表
        const fixedCategories = ['全部', '热搜', '社会', '科技', '娱乐', '体育', '财经', '汽车', '游戏', '美食', '时尚', '生活', '其他'];
        
        // 渲染分类按钮 - 根据API实际返回的分类动态生成
        function renderCategoryButtons(platform) {
            const selector = document.getElementById('categorySelector');
            const container = document.getElementById('categoryButtons');
            const list = hotData[platform];
            
            if (!list || list.length === 0) {
                selector.style.display = 'none';
                return;
            }
            
            // 统计各分类数量（使用API返回的原始分类）
            const categoryCount = {};
            list.forEach(item => {
                const cat = item.rawCategory || item.category || '其他';
                categoryCount[cat] = (categoryCount[cat] || 0) + 1;
            });
            
            // 获取所有分类并排序（按数量降序）
            const sortedCategories = Object.entries(categoryCount)
                .sort((a, b) => b[1] - a[1]);
            
            // 生成分类按钮 - 使用API真实的分类
            let html = '';
            
            // 先加"全部"按钮
            const isAllActive = currentCategory === 'all' || currentCategory === 'cat:all';
            html += `<button class="category-btn ${isAllActive ? 'active' : ''}" data-category="all">全部</button>`;
            
            // 再添加API返回的各个分类
            sortedCategories.forEach(([cat, count]) => {
                const isActive = currentCategory === cat || currentCategory === 'cat:' + cat;
                const activeClass = isActive ? 'active' : '';
                html += `<button class="category-btn ${activeClass}" data-category="${cat}">${cat} (${count})</button>`;
            });
            
            container.innerHTML = html;
            selector.style.display = 'block';
            
            // 绑定分类按钮事件
            container.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cat = btn.dataset.category;
                    container.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    if (cat === 'all') {
                        // 点击"全部"返回平台主页
                        currentCategory = 'all';
                        renderPlatform(platform);
                    } else {
                        // 点击其他分类进入独立分类页面
                        renderCategoryPage(platform, cat);
                    }
                });
            });
        }
        
        // 切换分类
        function switchCategory(category) {
            currentCategory = category;
            renderPlatform(currentPlatform);
        }

        // 绑定按钮事件
        document.querySelectorAll('.platform-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                switchPlatform(btn.dataset.platform);
            });
        });

        // 页面加载
        init();
    </script>
</body>
</html>
