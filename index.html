<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>全网热榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 0;
        }
        
        .main-wrapper {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 200px;
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            position: fixed;
            left: -200px;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: left 0.3s ease;
        }
        
        .sidebar.open {
            left: 0;
        }
        
        .menu-toggle {
            position: fixed;
            left: 15px;
            top: 15px;
            z-index: 101;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(238, 90, 111, 0.4);
            transition: all 0.3s ease;
        }
        
        .menu-toggle:active {
            transform: scale(0.95);
        }
        
        .sidebar-title {
            color: white;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .nav-item.active {
            background: rgba(102, 126, 234, 0.3);
            color: white;
            border-left-color: #667eea;
        }
        
        .nav-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .nav-text {
            font-size: 14px;
            font-weight: 500;
        }
        
        .container {
            flex: 1;
            margin-left: 0;
            background: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .content-area {
            display: none;
        }
        
        .content-area.active {
            display: block;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
            position: relative;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .header .subtitle {
            font-size: 13px;
            margin-top: 8px;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .refresh-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(180deg);
        }
        
        .refresh-btn:active {
            transform: rotate(360deg);
        }
        
        .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .platform-selector {
            padding: 10px 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            position: relative;
        }
        
        .platform-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #6c757d;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .toggle-btn {
            background: #e9ecef;
            border: none;
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 11px;
            color: #495057;
            transition: all 0.2s;
        }
        
        .toggle-btn:hover {
            background: #dee2e6;
        }
        
        .platform-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        .platform-buttons.collapsed {
            max-height: 40px;
            overflow: hidden;
        }
        
        .platform-btn {
            padding: 8px 16px;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        
        .platform-btn:hover {
            transform: translateY(-2px);
        }
        
        .platform-btn.active {
            transform: translateY(-2px);
        }
        
        /* 各平台品牌色 */
        .platform-btn.douyin {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            border-color: #1a1a2e;
        }
        
        .platform-btn.douyin:hover,
        .platform-btn.douyin.active {
            background: linear-gradient(135deg, #ff0050 0%, #00f2ea 100%);
            border-color: #ff0050;
            box-shadow: 0 4px 15px rgba(255,0,80,0.4);
        }
        
        .platform-btn.weibo {
            background: linear-gradient(135deg, #e6162d 0%, #ff6b6b 100%);
            color: white;
            border-color: #e6162d;
        }
        
        .platform-btn.weibo:hover,
        .platform-btn.weibo.active {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            box-shadow: 0 4px 15px rgba(230,22,45,0.4);
        }
        
        .platform-btn.bilibili {
            background: linear-gradient(135deg, #00a1d6 0%, #00b5e5 100%);
            color: white;
            border-color: #00a1d6;
        }
        
        .platform-btn.bilibili:hover,
        .platform-btn.bilibili.active {
            background: linear-gradient(135deg, #00b5e5 0%, #23ade5 100%);
            box-shadow: 0 4px 15px rgba(0,161,214,0.4);
        }
        
        .platform-btn.baidu {
            background: linear-gradient(135deg, #2932e1 0%, #4e6ef2 100%);
            color: white;
            border-color: #2932e1;
        }
        
        .platform-btn.baidu:hover,
        .platform-btn.baidu.active {
            background: linear-gradient(135deg, #4e6ef2 0%, #6b8cff 100%);
            box-shadow: 0 4px 15px rgba(41,50,225,0.4);
        }
        
        .platform-btn.twitter {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: white;
            border-color: #000000;
        }
        
        .platform-btn.twitter:hover,
        .platform-btn.twitter.active {
            background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .platform-btn.youtube {
            background: linear-gradient(135deg, #ff0000 0%, #ff4444 100%);
            color: white;
            border-color: #ff0000;
        }
        
        .platform-btn.youtube:hover,
        .platform-btn.youtube.active {
            background: linear-gradient(135deg, #ff3333 0%, #ff6666 100%);
            box-shadow: 0 4px 15px rgba(255,0,0,0.4);
        }
        
        .platform-btn.tiktok {
            background: linear-gradient(135deg, #ff0050 0%, #00f2ea 50%, #000000 100%);
            color: white;
            border-color: #ff0050;
        }
        
        .platform-btn.tiktok:hover,
        .platform-btn.tiktok.active {
            background: linear-gradient(135deg, #00f2ea 0%, #ff0050 50%, #000000 100%);
            box-shadow: 0 4px 15px rgba(255,0,80,0.4);
        }
        
        .platform-btn.zhihu {
            background: linear-gradient(135deg, #0084ff 0%, #0066cc 100%);
            color: white;
            border-color: #0084ff;
        }
        
        .platform-btn.zhihu:hover,
        .platform-btn.zhihu.active {
            background: linear-gradient(135deg, #0066cc 0%, #0084ff 100%);
            box-shadow: 0 4px 15px rgba(0,132,255,0.4);
        }
        
        .platform-btn.xiaohongshu {
            background: linear-gradient(135deg, #ff2442 0%, #ff6b7a 100%);
            color: white;
            border-color: #ff2442;
        }
        
        .platform-btn.xiaohongshu:hover,
        .platform-btn.xiaohongshu.active {
            background: linear-gradient(135deg, #ff6b7a 0%, #ff2442 100%);
            box-shadow: 0 4px 15px rgba(255,36,66,0.4);
        }
        
        .platform-btn.placeholder {
            background: #e9ecef;
            color: #adb5bd;
            border-color: #dee2e6;
        }
        
        .platform-btn.hupu {
            background: linear-gradient(135deg, #c01e2f 0%, #e03a4d 100%);
            color: white;
            border-color: #c01e2f;
        }
        
        .platform-btn.hupu:hover,
        .platform-btn.hupu.active {
            background: linear-gradient(135deg, #e03a4d 0%, #c01e2f 100%);
            box-shadow: 0 4px 15px rgba(192,30,47,0.4);
        }
        
        .platform-btn.douban {
            background: linear-gradient(135deg, #007722 0%, #00a040 100%);
            color: white;
            border-color: #007722;
        }
        
        .platform-btn.douban:hover,
        .platform-btn.douban.active {
            background: linear-gradient(135deg, #00a040 0%, #007722 100%);
            box-shadow: 0 4px 15px rgba(0,119,34,0.4);
        }
        
        .platform-btn.thepaper {
            background: linear-gradient(135deg, #004098 0%, #0066cc 100%);
            color: white;
            border-color: #004098;
        }
        
        .platform-btn.thepaper:hover,
        .platform-btn.thepaper.active {
            background: linear-gradient(135deg, #0066cc 0%, #004098 100%);
            box-shadow: 0 4px 15px rgba(0,64,152,0.4);
        }
        
        .platform-btn.netease {
            background: linear-gradient(135deg, #cc0000 0%, #ff3333 100%);
            color: white;
            border-color: #cc0000;
        }
        
        .platform-btn.netease:hover,
        .platform-btn.netease.active {
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            box-shadow: 0 4px 15px rgba(204,0,0,0.4);
        }
        

        
        .content {
            padding: 25px 20px;
            max-height: 65vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .content::-webkit-scrollbar {
            width: 6px;
        }
        
        .content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .content::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        
        .content::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #adb5bd;
        }
        
        .loading::before {
            content: '⏳';
            display: block;
            font-size: 48px;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .hot-list {
            display: none;
        }
        
        .hot-list.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .hot-item {
            display: flex;
            align-items: center;
            padding: 16px 15px;
            margin-bottom: 10px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hot-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
        }
        
        .hot-item:hover {
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }
        
        .rank {
            width: 40px;
            text-align: center;
            font-weight: 800;
            font-size: 18px;
            color: #adb5bd;
            flex-shrink: 0;
        }
        
        .rank.top1 {
            background: linear-gradient(135deg, #ffd700 0%, #ffb800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 22px;
        }
        
        .rank.top2 {
            background: linear-gradient(135deg, #c0c0c0 0%, #a8a8a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 20px;
        }
        
        .rank.top3 {
            background: linear-gradient(135deg, #cd7f32 0%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 20px;
        }
        
        .hot-text {
            flex: 1;
            padding: 0 15px;
            font-size: 15px;
            color: #2d3748;
            line-height: 1.5;
            font-weight: 500;
            word-break: break-word;
        }
        
        /* 热度颜色阶梯 - 从红到紫 */
        .hot-text.rank-1 {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0000 0%, #ff4757 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hot-text.rank-2 {
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hot-text.rank-3 {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6348 0%, #ff7f50 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hot-text.rank-4 {
            font-size: 16px;
            font-weight: 600;
            color: #e74c3c;
        }
        
        .hot-text.rank-5 {
            font-size: 15px;
            font-weight: 600;
            color: #e84393;
        }
        
        .hot-text.rank-6 {
            font-size: 15px;
            font-weight: 600;
            color: #9b59b6;
        }
        
        .hot-text.rank-7 {
            font-size: 15px;
            font-weight: 500;
            color: #8e44ad;
        }
        
        .hot-text.rank-8 {
            font-size: 15px;
            font-weight: 500;
            color: #667eea;
        }
        
        .hot-text.rank-9 {
            font-size: 15px;
            font-weight: 500;
            color: #3498db;
        }
        
        .hot-text.rank-10 {
            font-size: 15px;
            font-weight: 500;
            color: #2980b9;
        }
        
        .hot-text.rank-normal {
            font-size: 15px;
            font-weight: 400;
            color: #2d3748;
        }
        
        .hot-value {
            font-size: 12px;
            color: #868e96;
            flex-shrink: 0;
            min-width: 60px;
            text-align: right;
            font-weight: 500;
            padding: 5px 10px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        /* 热度标签颜色 */
        .hot-value.rank-1 {
            background: linear-gradient(135deg, #ff0000 0%, #ff4757 100%);
            color: white;
            font-weight: 700;
        }
        
        .hot-value.rank-2 {
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            color: white;
            font-weight: 700;
        }
        
        .hot-value.rank-3 {
            background: linear-gradient(135deg, #ff6348 0%, #ff7f50 100%);
            color: white;
            font-weight: 600;
        }
        
        .hot-value.rank-4 {
            background: #ffebee;
            color: #e74c3c;
            font-weight: 600;
        }
        
        .hot-value.rank-5 {
            background: #fce4ec;
            color: #e84393;
            font-weight: 600;
        }
        
        .hot-value.rank-6 {
            background: #f3e5f5;
            color: #9b59b6;
            font-weight: 600;
        }
        
        .hot-value.rank-7 {
            background: #ede7f6;
            color: #8e44ad;
            font-weight: 500;
        }
        
        .hot-value.rank-8 {
            background: #e8eaf6;
            color: #667eea;
            font-weight: 500;
        }
        
        .hot-value.rank-9 {
            background: #e3f2fd;
            color: #3498db;
            font-weight: 500;
        }
        
        .hot-value.rank-10 {
            background: #e1f5fe;
            color: #2980b9;
            font-weight: 500;
        }
        
        .hot-value.rank-normal {
            background: #f8f9fa;
            color: #6c757d;
        }
        
        .go-btn {
            width: 36px;
            height: 36px;
            min-width: 36px;
            margin-left: 10px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .go-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .go-btn:active {
            transform: scale(0.95);
        }
        
        /* 分类标签 */
        .hot-content {
            flex: 1;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .category-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            width: fit-content;
        }
        
        /* 分类筛选 - 微博风格 */
        .category-selector {
            padding: 0;
            background: white;
            border-bottom: 1px solid #e9ecef;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .category-selector::-webkit-scrollbar {
            display: none;
        }
        
        .category-buttons {
            display: flex;
            gap: 0;
            padding: 0 10px;
            min-width: max-content;
        }
        
        .category-btn {
            padding: 15px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            transition: all 0.2s;
            position: relative;
            white-space: nowrap;
        }
        
        .category-btn:hover {
            color: #333;
        }
        
        .category-btn.active {
            color: #333;
            font-weight: 600;
        }
        
        .category-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: linear-gradient(90deg, #ff6b6b, #ffa502);
            border-radius: 2px;
        }
        

        
        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #adb5bd;
            font-size: 13px;
            border-top: 1px solid #e9ecef;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #adb5bd;
        }
        
        .empty::before {
            content: '😕';
            display: block;
            font-size: 64px;
            margin-bottom: 15px;
        }
        
        .empty div:first-of-type {
            font-size: 18px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }
        
        .empty div:last-of-type {
            font-size: 13px;
            color: #adb5bd;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 180px;
                left: -180px;
            }
            
            .sidebar.open {
                left: 0;
            }
            
            .menu-toggle {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
            
            .main-content {
                padding: 15px;
            }
            
            .header {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .header p {
                font-size: 13px;
            }
            
            .sidebar:not(.open) .nav-text {
                display: none;
            }
            
            .container {
                margin-left: 0;
            }
            
            .platform-buttons {
                gap: 6px;

        // 获取单个API的数据（带超时和重试）
        async function fetchSingleAPI(platform, apiUrl, timeout = 8000) {
            try {
                // 使用随机数+时间戳双重防缓存
                const cacheBuster = `_t=${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                const separator = apiUrl.includes('?') ? '&' : '?';
                const url = apiUrl + separator + cacheBuster;
                
                // 创建AbortController用于超时控制
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                    },
                    cache: 'no-store',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const result = await response.json();
                
                // 统一处理不同API的返回格式
                // 格式1: { code: 200, data: [...] }
                if (result.code === 200 && result.data) {
                    return Array.isArray(result.data) ? result.data : [result.data];
                }
                // 格式2: 直接返回数组
                else if (Array.isArray(result)) {
                    return result;
                }
                // 格式3: { data: [...] }
                else if (result.data && Array.isArray(result.data)) {
                    return result.data;
                }
                // 格式4: { result: [...] }
                else if (result.result && Array.isArray(result.result)) {
                    return result.result;
                }
                // 格式5: { list: [...] }
                else if (result.list && Array.isArray(result.list)) {
                    return result.list;
                }
                
                console.warn(`[${platform}] 无法解析API返回格式:`, result);
                return [];
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.warn(`[${platform}] API请求超时: ${apiUrl}`);
                } else {
                    console.warn(`[${platform}] API请求失败: ${apiUrl}`, error.message);
                }
                return [];
            }
        }

            const merged = [];
            
            rawDataArray.forEach(item => {
                // 提取唯一标识（标题）
                let title = '';
                if (typeof item === 'string') {
                    title = item;
                } else if (typeof item === 'object' && item !== null) {
                    title = item.title || item.word || item.name || item.topic || item.query || item.keyword || '';
                }
                
                // 标准化标题用于去重（去除空格、转为小写）
                const normalizedTitle = title.toString().toLowerCase().replace(/\s+/g, '');
                
                if (normalizedTitle && !seen.has(normalizedTitle)) {
                    seen.add(normalizedTitle);
                    merged.push(item);
                }
            });
            
            return merged;
        }

        // 解析不同平台的数据格式
        function parsePlatformData(platform, data) {
            let list = [];
            
            // 统一处理各种可能的数据结构
            let rawList = [];
            
            if (Array.isArray(data)) {
                rawList = data;
            } else if (data && typeof data === 'object') {
                // 尝试从对象中提取数组
                const possibleArrays = ['list', 'data', 'items', 'result', 'hot_list', 'trends'];
                for (const key of possibleArrays) {
                    if (Array.isArray(data[key])) {
                        rawList = data[key];
                        break;
                    }
                }
                // 如果还是没找到，尝试对象的第一个数组属性
                if (rawList.length === 0) {
                    for (const key in data) {
                        if (Array.isArray(data[key]) && data[key].length > 0) {
                            rawList = data[key];
                            break;
                        }
                    }
                }
            }
            
            if (rawList.length === 0) {
                console.warn(`${platform} 平台未获取到数据`, data);
                return [];
            }
            
            // 解析所有数据
            let fullList = rawList.map((item, index) => {
                let word = '';
                let hotValue = 0;
                let label = null;
                
                if (typeof item === 'string') {
                    word = item;
                } else if (typeof item === 'object' && item !== null) {
                    // 尝试各种可能的字段名
                    word = item.word || item.title || item.name || item.topic || item.query || item.keyword || item.content || item.text || JSON.stringify(item);
                    
                    // 尝试各种可能的热度字段
                    const hotFields = ['hot_value', 'hotValue', 'hot', 'heat', 'score', 'count', 'num', 'value', 'index', 'rank'];
                    for (const field of hotFields) {
                        if (item[field] !== undefined && item[field] !== null) {
                            const val = parseHotValue(item[field]);
                            if (val > hotValue) hotValue = val;
                        }
                    }
                    
                    // 获取分类标签（抖音）
                    label = item.label !== undefined ? item.label : null;
                }
                
                // 获取分类信息
                const categoryInfo = getCategoryInfo(platform, word, label);
                
                // 优先使用API返回的原始排名，如果没有则使用索引+1
                const apiPosition = item.position || item.rank || item.index || item.order;
                
                return {
                    word: word,
                    hotValue: hotValue,
                    position: apiPosition || (index + 1),
                    category: categoryInfo.name,
                    categoryColor: categoryInfo.color,
                    rawCategory: categoryInfo.rawName, // API原始分类名称
                    label: label
                };
            });
            
            // 对于微博平台，保留API返回的原始排名（更权威）
            // 其他平台按热度排序
            if (platform !== 'weibo') {
                fullList.sort((a, b) => b.hotValue - a.hotValue);
                // 重新设置排名
                fullList.forEach((item, index) => {
                    item.position = index + 1;
                });
            }
            
            // 保存完整数据
            hotData[platform + '_raw'] = [...fullList];
            
            // 返回全部数据（不限制条数）
            list = fullList;
            
            return list;
        }

        // 解析热度值字符串（如"100万"）
        function parseHotValue(hotStr) {
            if (!hotStr) return 0;
            
            if (typeof hotStr === 'number') return hotStr;
            
            const str = String(hotStr).toLowerCase();
            const num = parseFloat(str.replace(/[^0-9.]/g, ''));
            
            if (str.includes('亿')) {
                return num * 100000000;
            } else if (str.includes('万')) {
                return num * 10000;
            }
            
            return num || 0;
        }

        // 格式化热度值
        function formatHotValue(value) {
            if (value >= 100000000) return (value / 100000000).toFixed(1) + '亿';
            else if (value >= 10000) return (value / 10000).toFixed(0) + '万';
            return value;
        }

        // 搜索关键词
        function searchKeyword(platform, keyword) {
            const config = platforms[platform];
            const url = config.searchUrl + keyword;
            window.open(url, '_blank');
        }

        // Yandex 搜索功能
        function performYandexSearch() {
            const input = document.getElementById('searchInput');
            const keyword = input.value.trim();
            
            if (!keyword) {
                input.focus();
                input.style.borderColor = '#e74c3c';
                setTimeout(() => {
                    input.style.borderColor = '#e9ecef';
                }, 1000);
                return;
            }
            
            // Yandex 搜索 URL
            const yandexUrl = 'https://yandex.com/search/?text=' + encodeURIComponent(keyword);
            window.open(yandexUrl, '_blank');
            
            // 清空输入框
            input.value = '';
        }

        // 刷新所有数据
        async function refreshAllData() {
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.classList.add('loading');
            
            // 显示渐进式加载提示
            document.querySelector('.content').innerHTML = `
                <div class="loading">
                    <div>正在获取最新数据...</div>
                    <div style="font-size: 13px; margin-top: 10px; opacity: 0.7;">
                        智能检测数据新鲜度 · 多源聚合
                    </div>
                </div>
            `;
            
            // 清除缓存强制刷新
            Object.keys(platforms).forEach(platform => {
                dataFreshness.clearCache(platform);
            });
            
            await loadAllData();
            renderPlatform(currentPlatform);
            
            refreshBtn.classList.remove('loading');
            
            // 根据结果显示不同提示
            const cache = dataFreshness.getCache(currentPlatform);
            const originalText = refreshBtn.textContent;
            
            if (!cache) {
                // 获取失败
                refreshBtn.textContent = '✗';
                refreshBtn.style.background = 'rgba(231, 76, 60, 0.3)';
            } else {
                // 获取成功
                refreshBtn.textContent = '✓';
                refreshBtn.style.background = 'rgba(0, 184, 148, 0.3)';
            }
            
            setTimeout(() => {
                refreshBtn.textContent = originalText;
                refreshBtn.style.background = '';
            }, 1500);
        }

        // 更新底部时间
        function updateFooterTime(stats = null) {
            lastUpdateTime = new Date();
            const platformName = platforms[currentPlatform].name;
            const dataCount = hotData[currentPlatform] ? hotData[currentPlatform].length : 0;
            
            // 数据新鲜度指示器
            let freshnessIndicator = '';
            if (stats) {
                if (stats.failed > 0) {
                    freshnessIndicator = ` <span style="color: #e74c3c;">⚠️ ${stats.failed}个平台获取失败</span>`;
                } else if (stats.fresh === Object.keys(platforms).length) {
                    freshnessIndicator = ' <span style="color: #00b894;">✓ 全部最新</span>';
                } else if (stats.cached > 0) {
                    freshnessIndicator = ' <span style="color: #f39c12;">⚡ 使用缓存</span>';
                } else if (stats.stale > 0) {
                    freshnessIndicator = ` <span style="color: #f39c12;">~ ${stats.stale}个平台数据未更新</span>`;
                }
            }
            
            document.getElementById('updateTime').innerHTML = 
                '更新时间: ' + lastUpdateTime.toLocaleString('zh-CN', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                }) + ` | ${platformName}: ${dataCount}条${freshnessIndicator}`;
        }

        // 渲染分类按钮 - 根据API实际返回的分类动态生成
        function renderCategoryButtons(platform) {
            const selector = document.getElementById('categorySelector');
            const container = document.getElementById('categoryButtons');
            const list = hotData[platform];
            
            if (!list || list.length === 0) {
                selector.style.display = 'none';
                return;
            }
            
            // 统计各分类数量（使用API返回的原始分类）
            const categoryCount = {};
            list.forEach(item => {
                const cat = item.rawCategory || item.category || '其他';
                categoryCount[cat] = (categoryCount[cat] || 0) + 1;
            });
            
            // 获取所有分类并排序（按数量降序）
            const sortedCategories = Object.entries(categoryCount)
                .sort((a, b) => b[1] - a[1]);
            
            // 生成分类按钮 - 使用API真实的分类
            let html = '';
            
            // 先加"全部"按钮
            const isAllActive = currentCategory === 'all' || currentCategory === 'cat:all';
            html += `<button class="category-btn ${isAllActive ? 'active' : ''}" data-category="all">全部</button>`;
            
            // 再添加API返回的各个分类
            sortedCategories.forEach(([cat, count]) => {
                const isActive = currentCategory === cat || currentCategory === 'cat:' + cat;
                const activeClass = isActive ? 'active' : '';
                html += `<button class="category-btn ${activeClass}" data-category="${cat}">${cat} (${count})</button>`;
            });
            
            container.innerHTML = html;
            selector.style.display = 'block';
            
            // 绑定分类按钮事件
            container.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cat = btn.dataset.category;
                    container.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    if (cat === 'all') {
                        // 点击"全部"返回平台主页
                        currentCategory = 'all';
                        renderPlatform(platform);
                    } else {
                        // 点击其他分类进入独立分类页面
                        renderCategoryPage(platform, cat);
                    }
                });
            });
        }

        function seededRandom(seed) {
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = ((hash << 5) - hash) + seed.charCodeAt(i);
                hash = hash & hash;
            }
            return function() {
                hash = (hash * 9301 + 49297) % 233280;
                return hash / 233280;
            };
        }

        function calculateBazi(date, timeIndex) {
            // 简化版八字计算（基于公历日期近似转换）
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            
            // 年柱（简化计算）
            const yearGanIndex = (year - 4) % 10;
            const yearZhiIndex = (year - 4) % 12;
            
            // 月柱（简化计算）
            const monthGanIndex = (yearGanIndex * 2 + month + 1) % 10;
            const monthZhiIndex = (month + 1) % 12;
            
            // 日柱（简化计算）
            const baseDate = new Date(1900, 0, 31);
            const diffDays = Math.floor((date - baseDate) / (1000 * 60 * 60 * 24));
            const dayGanIndex = (diffDays + 10) % 10;
            const dayZhiIndex = (diffDays + 12) % 12;
            
            // 时柱

            const timeGanIndex = (dayGan * 2 + timeIndex) % 10;

                year: { gan: tianGan[yearGanIndex], zhi: diZhi[yearZhiIndex] },

                    yi: ['展示才华', '领导团队', '健身运动', '烹饪美食', '参加聚会'],
                    ji: ['冲动决策', '与人冲突', '玩火危险', '暴晒中暑', '情绪失控']
                },
                '土': {
                    yi: ['处理琐事', '整理资料', '房产相关', '陪伴家人', '稳健投资'],
                    ji: ['冒险投机', '改变计划', '暴饮暴食', '久坐不动', '固执己见']
                }
            };
            
            return yiJiData[strongElement];
        }
        
        function displayFortuneResult(result) {
            const resultDiv = document.getElementById('fortuneResult');
            
            // 计算五行百分比
            const totalElements = Object.values(result.elements).reduce((a, b) => a + b, 0);
            const elementPercentages = Object.entries(result.elements).map(([k, v]) => ({
                element: k,
                count: v,
                percentage: Math.round((v / totalElements) * 100)
            })).sort((a, b) => b.count - a.count);
            
            resultDiv.innerHTML = `
                <div class="fortune-header">
                    <div class="fortune-zodiac">${result.bazi.zodiac}</div>
                    <div class="fortune-title">${result.userName}</div>
                    <div class="fortune-subtitle">${result.personality.title} · 日主${result.dayElement} · ${result.isStrongDay ? '身强' : '身弱'}</div>
                </div>
                
                <!-- 四柱八字 -->
                <div class="bazi-section-card">
                    <div class="bazi-section-header">
                        <span class="section-icon">📅</span>
                        <span class="section-title">四柱八字</span>
                    </div>
                    <div class="bazi-pillars-detailed">
                        <div class="bazi-pillar-item">
                            <div class="pillar-label">年柱</div>
                            <div class="pillar-content">
                                <div class="pillar-gan" data-element="${wuXing[result.bazi.year.gan]}">${result.bazi.year.gan}</div>
                                <div class="pillar-zhi" data-element="${wuXing[result.bazi.year.zhi]}">${result.bazi.year.zhi}</div>
                                <div class="pillar-nayin">${result.naYin[0]}</div>
                            </div>
                        </div>
                        <div class="bazi-pillar-item">
                            <div class="pillar-label">月柱</div>
                            <div class="pillar-content">
                                <div class="pillar-gan" data-element="${wuXing[result.bazi.month.gan]}">${result.bazi.month.gan}</div>
                                <div class="pillar-zhi" data-element="${wuXing[result.bazi.month.zhi]}">${result.bazi.month.zhi}</div>
                                <div class="pillar-nayin">${result.naYin[1]}</div>
                            </div>
                        </div>
                        <div class="bazi-pillar-item">
                            <div class="pillar-label">日柱</div>
                            <div class="pillar-content">
                                <div class="pillar-gan highlight" data-element="${wuXing[result.bazi.day.gan]}">${result.bazi.day.gan}</div>
                                <div class="pillar-zhi" data-element="${wuXing[result.bazi.day.zhi]}">${result.bazi.day.zhi}</div>
                                <div class="pillar-nayin">${result.naYin[2]}</div>
                            </div>
                        </div>
                        <div class="bazi-pillar-item">
                            <div class="pillar-label">时柱</div>
                            <div class="pillar-content">
                                <div class="pillar-gan" data-element="${wuXing[result.bazi.time.gan]}">${result.bazi.time.gan}</div>
                                <div class="pillar-zhi" data-element="${wuXing[result.bazi.time.zhi]}">${result.bazi.time.zhi}</div>
                                <div class="pillar-nayin">${result.naYin[3]}</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 五行分析 -->
                <div class="bazi-section-card">
                    <div class="bazi-section-header">
                        <span class="section-icon">⚖️</span>
                        <span class="section-title">五行分析</span>
                    </div>
                    <div class="elements-analysis">
                        <div class="elements-chart">
                            ${elementPercentages.map(e => `
                                <div class="element-bar-item">
                                    <div class="element-label">${e.element}</div>
                                    <div class="element-bar-wrapper">
                                        <div class="element-bar ${e.element}" style="width: ${e.percentage}%"></div>
                                    </div>
                                    <div class="element-value">${e.count}个 (${e.percentage}%)</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="elements-summary">
                            <div class="element-highlight">
                                <span class="highlight-label">五行旺相：</span>
                                <span class="highlight-value ${result.strongElement}">${result.strongElement}</span>
                            </div>
                            <div class="element-highlight">
                                <span class="highlight-label">五行偏弱：</span>
                                <span class="highlight-value ${result.weakElement}">${result.weakElement}</span>
                            </div>
                            <div class="element-advice">
                                建议多接触${result.weakElement}属性的事物来平衡命理，如${getElementAdvice(result.weakElement)}
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 性格分析 -->
                <div class="bazi-section-card">
                    <div class="bazi-section-header">
                        <span class="section-icon">🎭</span>
                        <span class="section-title">性格分析</span>
                    </div>
                    <div class="personality-analysis">
                        <div class="personality-type">${result.personality.title}</div>
                        <div class="personality-traits">
                            <div class="trait-section">
                                <div class="trait-title">✨ 性格优点</div>
                                <div class="trait-list">
                                    ${result.personality.traits.map(t => `<span class="trait-tag good">${t}</span>`).join('')}
                                </div>
                            </div>
                            <div class="trait-section">
                                <div class="trait-title">⚠️ 需要注意</div>
                                <div class="trait-list">
                                    ${result.personality.weakness.map(t => `<span class="trait-tag caution">${t}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="personality-career">
                            <strong>💼 事业建议：</strong>${result.personality.career}
                        </div>
                        <div class="personality-love">
                            <strong>💕 感情建议：</strong>${result.personality.love}
                        </div>
                    </div>
                </div>
                
                <!-- 今日运势 -->
                <div class="bazi-section-card today-fortune">
                    <div class="bazi-section-header">
                        <span class="section-icon">🔮</span>
                        <span class="section-title">今日运势</span>
                        <span class="fortune-level ${result.todayAnalysis.level === '大吉' ? 'excellent' : result.todayAnalysis.level === '吉' ? 'good' : result.todayAnalysis.level === '平' ? 'normal' : 'bad'}">${result.todayAnalysis.level}</span>
                    </div>
                    <div class="today-fortune-content">
                        <p>${result.todayAnalysis.desc}</p>
                        <div class="fortune-advice-box">
                            <strong>💡 今日建议：</strong>${result.todayAnalysis.advice}
                        </div>
                    </div>
                </div>
                
                <!-- 五大运势 -->
                <div class="bazi-section-card">
                    <div class="bazi-section-header">
                        <span class="section-icon">📊</span>
                        <span class="section-title">五大运势详解</span>
                    </div>
                    <div class="five-fortunes">
                        ${result.fiveFortunes.map(f => `
                            <div class="fortune-item">
                                <div class="fortune-item-header">
                                    <span class="fortune-icon">${f.icon}</span>
                                    <span class="fortune-name">${f.title}</span>
                                    <div class="fortune-score-bar">
                                        <div class="fortune-score-fill" style="width: ${f.score}%; background: ${getScoreColor(f.score)}"></div>
                                    </div>
                                    <span class="fortune-score-value">${f.score}分</span>
                                </div>
                                <div class="fortune-item-detail">${f.detail}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <!-- 今日宜忌 -->
                <div class="bazi-section-card">
                    <div class="bazi-section-header">
                        <span class="section-icon">📋</span>
                        <span class="section-title">今日宜忌</span>
                    </div>
                    <div class="yiji-container">
                        <div class="yiji-box yi">
                            <div class="yiji-title">✅ 宜</div>
                            <div class="yiji-list">
                                ${result.yiJi.yi.map(item => `<span class="yiji-item">${item}</span>`).join('')}
                            </div>
                        </div>
                        <div class="yiji-box ji">
                            <div class="yiji-title">❌ 忌</div>
                            <div class="yiji-list">
                                ${result.yiJi.ji.map(item => `<span class="yiji-item">${item}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
                
                <button class="fortune-retry" onclick="resetFortune()">🔄 重新测算</button>
            `;
            
            document.getElementById('fortuneForm').style.display = 'none';
            resultDiv.style.display = 'block';
        }
        
        function getElementAdvice(element) {
            const advice = {
                '金': '佩戴金属饰品、穿白色衣服、去西方',
                '木': '多接触植物、穿绿色衣服、去东方',
                '水': '多喝水、穿黑色衣服、去北方、游泳',
                '火': '晒太阳、穿红色衣服、去南方',
                '土': '接触大地、穿黄色衣服、去中部地区'
            };
            return advice[element] || '';
        }
        
        function getScoreColor(score) {
            if (score >= 90) return 'linear-gradient(90deg, #27ae60, #2ecc71)';
            if (score >= 80) return 'linear-gradient(90deg, #3498db, #5dade2)';
            if (score >= 70) return 'linear-gradient(90deg, #f39c12, #f5b041)';
            return 'linear-gradient(90deg, #e74c3c, #ec7063)';
        }
        
        function resetFortune() {
            document.getElementById('fortuneForm').style.display = 'block';
            document.getElementById('fortuneResult').style.display = 'none';
        }
        

    </script>
</body>
</html>
